plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

android {
    compileSdk 34
    namespace "com.vidmax.player"
    
    defaultConfig {
        applicationId "com.vidmax.player"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    
    kotlinOptions {
        jvmTarget = '1.8'
    }
    
    buildFeatures {
        compose true
    }
    
    composeOptions {
        kotlinCompilerExtensionVersion '1.5.13'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0'
    implementation 'androidx.activity:activity-compose:1.8.2'
	
    // Compose
    implementation 'androidx.compose.runtime:runtime:1.5.4'
    implementation 'androidx.compose.runtime:runtime-saveable:1.5.4'
    implementation 'androidx.compose.ui:ui:1.5.4'
    implementation 'androidx.compose.ui:ui-tooling-preview:1.5.4'
    implementation 'androidx.compose.foundation:foundation:1.5.4'
    implementation 'androidx.compose.material3:material3:1.1.2'
    implementation 'androidx.compose.material:material-icons-core:1.5.4'
    implementation 'androidx.navigation:navigation-compose:2.7.7'

    // UI AndroidX
    implementation 'com.google.android.material:material:1.12.0-alpha03'
    implementation 'androidx.appcompat:appcompat:1.7.0-alpha03'

    // Coil (ভিডিও থাম্বনেইল লোড করার জন্য)
    implementation "io.coil-kt:coil-compose:2.4.0"
    implementation 'io.coil-kt:coil-video:2.4.0'
    
    // ম্যাজিক ২: Google Media3 (ExoPlayer) - ফর জিরো ড্রপ & সুপার স্মুথনেস! 🔥
    implementation "androidx.media3:media3-exoplayer:1.2.1"
    implementation "androidx.media3:media3-ui:1.2.1"
    implementation "androidx.media3:media3-common:1.2.1"
}
