plugins {
    id 'com.android.application'
    id 'kotlin-android'
    // Kotlin 2.0 এর জন্য নতুন Compose প্লাগিন
    id 'org.jetbrains.kotlin.plugin.compose' 
}

android {
    // 🔥 একদম লেটেস্ট API 35 (Android 15)
    compileSdk 35
    namespace "com.vidmax.player"
    
    defaultConfig {
        applicationId "com.vidmax.player"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
    
    buildFeatures {
        compose true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.6'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.8.6'
    implementation 'androidx.activity:activity-compose:1.9.2'
	
    // 🔥 CodeAssist এ এরর এড়াতে BOM ছাড়া সরাসরি লেটেস্ট Compose ভার্সন
    implementation 'androidx.compose.runtime:runtime:1.7.4'
    implementation 'androidx.compose.runtime:runtime-saveable:1.7.4'
    implementation 'androidx.compose.ui:ui:1.7.4'
    implementation 'androidx.compose.ui:ui-tooling-preview:1.7.4'
    implementation 'androidx.compose.foundation:foundation:1.7.4'
    implementation 'androidx.compose.material3:material3:1.3.0'
    implementation 'androidx.compose.material:material-icons-core:1.7.4'
    
    implementation 'androidx.navigation:navigation-compose:2.8.3'

    // UI AndroidX
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.7.0'

    // Coil
    implementation "io.coil-kt:coil-compose:2.7.0"
    implementation 'io.coil-kt:coil-video:2.7.0'
    
    // Google Media3 (ExoPlayer) - লেটেস্ট রিলিজ
    implementation "androidx.media3:media3-exoplayer:1.4.1"
    implementation "androidx.media3:media3-ui:1.4.1"
    implementation "androidx.media3:media3-common:1.4.1"
}
