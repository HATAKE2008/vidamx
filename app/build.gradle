plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'org.jetbrains.kotlin.plugin.compose'
}

android {
    compileSdk 35
    namespace "com.vidmax.player"

    defaultConfig {
        applicationId "com.vidmax.player"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "vidmax.keystore")
            storePassword System.getenv("STORE_PASS") ?: "vidmax123"
            keyAlias System.getenv("KEY_ALIAS") ?: "vidmax"
            keyPassword System.getenv("KEY_PASS") ?: "vidmax123"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        compose true
    }

    packagingOptions {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                '**/*.kotlin_module'
            ]
        }
        jniLibs {
            useLegacyPackaging true
        }
    }

    bundle {
        language { enableSplit = true }
        density { enableSplit = true }
        abi { enableSplit = true }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.6'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.8.6'
    implementation 'androidx.activity:activity-compose:1.9.2'

    implementation 'androidx.compose.runtime:runtime:1.7.4'
    implementation 'androidx.compose.runtime:runtime-saveable:1.7.4'
    implementation 'androidx.compose.ui:ui:1.7.4'
    implementation 'androidx.compose.ui:ui-tooling-preview:1.7.4'
    implementation 'androidx.compose.foundation:foundation:1.7.4'
    implementation 'androidx.compose.material3:material3:1.3.0'
    implementation 'androidx.compose.material:material-icons-core:1.7.4'

    implementation 'androidx.navigation:navigation-compose:2.8.3'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.7.0'

    implementation 'io.coil-kt:coil-compose:2.7.0'
    implementation 'io.coil-kt:coil-video:2.7.0'

    implementation 'androidx.media3:media3-exoplayer:1.4.1'
    implementation 'androidx.media3:media3-ui:1.4.1'
    implementation 'androidx.media3:media3-common:1.4.1'
}
