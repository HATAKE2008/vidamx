name: Build VidMax APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Setup Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > vidmax.keystore

    - name: Build Signed APK
      run: ./gradlew assembleRelease
      env:
        GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
        KEYSTORE_PATH: ${{ github.workspace }}/vidmax.keystore
        STORE_PASS: vidmax123
        KEY_ALIAS: vidmax
        KEY_PASS: vidmax123

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VidMax-Release-APK
        path: app/build/outputs/apk/release/*.apk
