name: Build VidMax APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout VidMax
      uses: actions/checkout@v4

    - name: Download MPV .so files
      run: |
        APK_URL=$(curl -s https://api.github.com/repos/mpv-android/mpv-android/releases/latest \
          | grep "browser_download_url" \
          | grep "arm64-v8a" \
          | grep -v "api29" \
          | head -1 \
          | cut -d '"' -f 4)
        echo "Downloading: $APK_URL"
        curl -L "$APK_URL" -o mpv.apk
        unzip -o mpv.apk "lib/arm64-v8a/*.so" -d mpv_extracted
        mkdir -p app/src/main/jniLibs/arm64-v8a
        cp mpv_extracted/lib/arm64-v8a/*.so app/src/main/jniLibs/arm64-v8a/
        echo "Copied .so files:"
        ls app/src/main/jniLibs/arm64-v8a/

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Setup Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > vidmax.keystore

    - name: Build Signed APK
      run: ./gradlew assembleRelease
      env:
        GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
        KEYSTORE_PATH: ${{ github.workspace }}/vidmax.keystore
        STORE_PASS: vidmax123
        KEY_ALIAS: vidmax
        KEY_PASS: vidmax123

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VidMax-Release-APK
        path: app/build/outputs/apk/release/*.apk
