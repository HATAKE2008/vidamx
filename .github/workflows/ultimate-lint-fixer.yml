name: 🪄 Ultimate Lint Auto-Fixer

on:
  workflow_dispatch: # শুধুমাত্র ম্যানুয়ালি রান করার জন্য

jobs:
  fix-all-lint-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write # গিটহাবে ফিক্স করা কোড সেভ করার পারমিশন

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧹 Run Bash Scripts (Locale, Autoboxing, Clean Resources)
        run: |
          # 1. Default Locale Fixes (String.format)
          echo "Fixing Default Locales..."
          find . -type f -name "VideoRepository.kt" -exec sed -i 's/String.format("%d:%02d:%02d",/String.format(java.util.Locale.US, "%d:%02d:%02d",/g' {} +
          find . -type f -name "VideoRepository.kt" -exec sed -i 's/String.format("%02d:%02d",/String.format(java.util.Locale.US, "%02d:%02d",/g' {} +
          find . -type f -name "VideoRepository.kt" -exec sed -i 's/String.format("%.1f GB",/String.format(java.util.Locale.US, "%.1f GB",/g' {} +
          find . -type f -name "VideoRepository.kt" -exec sed -i 's/String.format("%.1f MB",/String.format(java.util.Locale.US, "%.1f MB",/g' {} +
          find . -type f -name "VideoRepository.kt" -exec sed -i 's/String.format("%.1f KB",/String.format(java.util.Locale.US, "%.1f KB",/g' {} +
          find . -type f -name "*PlayerScreen.kt" -exec sed -i 's/String.format("%.2f MB",/String.format(java.util.Locale.US, "%.2f MB",/g' {} +

          # 2. Autoboxing Fix in MainScreen.kt
          echo "Fixing Autoboxing States..."
          find . -type f -name "MainScreen.kt" -exec sed -i 's/mutableStateOf(0)/mutableIntStateOf(0)/g' {} +
          find . -type f -name "MainScreen.kt" -exec sed -i '/import androidx.compose.runtime.mutableStateOf/a import androidx.compose.runtime.mutableIntStateOf' {} +

          # 3. Delete Unused XML Files
          echo "Deleting Unused Resources..."
          find . -type f -path "*/res/layout/activity_main.xml" -delete
          find . -type f -path "*/res/drawable/ic_close.xml" -delete
          find . -type f -path "*/res/drawable/ic_play_circle.xml" -delete
          find . -type f -path "*/res/drawable/ic_sort.xml" -delete
          find . -type f -path "*/res/drawable/ic_stream.xml" -delete
          find . -type f -path "*/res/mipmap-anydpi-v26/ic_launcher_round.xml" -delete
          find . -type d -path "*/res/drawable-v24" -exec rm -rf {} + || true

          # 4. Delete Unused Colors and Strings from XML
          echo "Cleaning XML code..."
          find . -type f -path "*/res/values/colors.xml" -exec sed -i '/name="maroon"/d; /name="gold"/d; /name="background"/d' {} +
          find . -type f -path "*/res/values/strings.xml" -exec sed -i '/name="app_name"/d' {} +

      - name: 🐍 Apply Python Scripts (OptIn & Constraints Fix)
        run: |
          cat > /tmp/fix_lint.py << 'PYEOF'
          import re
          import os

          BASE = "app/src/main/java/com/vidmax/player"
          ANNOTATION = "@file:OptIn(androidx.media3.common.util.UnstableApi::class)\n\n"

          def add_file_optin(rel_path):
              full = os.path.join(BASE, rel_path)
              if not os.path.exists(full):
                  print(f"[SKIP] Not found: {full}")
                  return
              with open(full, "r", encoding="utf-8") as f:
                  txt = f.read()
              if "@file:OptIn(androidx.media3.common.util.UnstableApi::class)" in txt:
                  print(f"[OK]   Already fixed: {full}")
                  return
              # Insert @file: annotation before 'package' line (Kotlin spec)
              new_txt = re.sub(
                  r"(^package )",
                  ANNOTATION + r"\1",
                  txt,
                  count=1,
                  flags=re.MULTILINE
              )
              if new_txt == txt:
                  print(f"[WARN] 'package' line not found in: {full}")
                  return
              with open(full, "w", encoding="utf-8") as f:
                  f.write(new_txt)
              print(f"[FIX]  Added @file:OptIn -> {full}")

          def fix_box_with_constraints(rel_path):
              full = os.path.join(BASE, rel_path)
              if not os.path.exists(full):
                  print(f"[SKIP] Not found: {full}")
                  return
              with open(full, "r", encoding="utf-8") as f:
                  txt = f.read()
              # Replace BoxWithConstraints with Box
              new_txt = re.sub(r"\bBoxWithConstraints\b", "Box", txt)
              if new_txt == txt:
                  print(f"[OK]   No BoxWithConstraints found: {full}")
                  return
              count = len(re.findall(r"\bBoxWithConstraints\b", txt))
              with open(full, "w", encoding="utf-8") as f:
                  f.write(new_txt)
              print(f"[FIX]  Replaced {count} BoxWithConstraints -> Box in {full}")

          print("\n-- UnsafeOptInUsageError Fix --")
          add_file_optin("ui/player/PlayerControls.kt")
          add_file_optin("ui/player/PlayerScreen.kt")

          print("\n-- UnusedBoxWithConstraintsScope Fix --")
          fix_box_with_constraints("ui/screen/GlassPlayerScreen.kt")
          PYEOF
          python3 /tmp/fix_lint.py

      - name: 🚀 Commit & Push All Fixed Code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🪄 fix: Ultimate Lint Auto-Fix (Locale, OptIn, Unused Res & Constraints)"
          commit_user_name: "VidMax Magic-Bot"
          commit_user_email: "actions@github.com"
